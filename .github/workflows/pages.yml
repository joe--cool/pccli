name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: cp scripts/banner.ansi internal/cli/banner.ansi
      - run: CGO_ENABLED=0 go build -o bin/pccli ./cmd/pccli
      - run: |
          docker run --rm \
            -v "$PWD:/vhs" \
            -w /vhs \
            -e PATH="/vhs/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            ghcr.io/charmbracelet/vhs scripts/demo.tape
      - uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          enablement: true
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site
      - id: deployment
        uses: actions/deploy-pages@v5
